<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고도필름</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- 카톡/인스타 공유 시 뜨는 제목 -->
  <meta property="og:title" content="고도필름">

  <!-- 카톡/인스타 공유 시 뜨는 설명 -->
  <meta property="og:description" content="찰나의 순간을 나만의 등산필름으로, 고도필름">

  <!-- 준비한 썸네일 이미지 이름 -->
  <meta property="og:image" content="https://blueaboveall.github.io/GodoFilm/og-image-2.png">
</head>
<body>
  <!-- 앱 최상단에 배치될 스플래시 화면 -->
  <div id="splash-screen">
    <div class="splash-logo-wrapper">
      <!-- 왼쪽으로 밀리며 나타날 GOD 글자 -->
      <div class="splash-god-box">
        <img src="god-text.png" alt="GOD" class="anim-god">
      </div>
      <!-- 중앙에 있다가 오른쪽으로 튕겨 나갈 카메라 O -->
      <div class="splash-camera-box">
        <img src="camera-o.png" alt="Camera O" class="anim-camera">
      </div>
    </div>
    
    <!-- 하단에 뱅글뱅글 도는 모던한 로딩 바 -->
    <div class="splash-loader"></div>
  </div>

  <div class="full-screen-bg"></div>

  <div class="background-container home-mode" id="main-container">
    <!-- 1. 홈 화면 뷰 -->
    <div id="home-view" class="main-view">
      <!-- 빈 화면 영역 (프로젝트가 없을 때만 표시) -->
      <div id="empty-state" class="empty-state">
        <div class="empty-project-message">
          <div class="empty-mountain-icon">⛰️</div>
          <div class="empty-title">아직 프로젝트가 없어요</div>
          <div class="empty-subtitle">첫 고도 필름을 만들어 보세요</div>
        </div>
      </div>

      <!-- 기존 프로젝트 목록 그리드 -->
      <div class="project-grid"></div>

      <!-- 하단 '새 프로젝트 생성' 버튼 -->
      <button id="open-modal-btn" class="create-project-btn" aria-label="새 프로젝트 생성">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="9" x2="12" y2="15"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
        </svg>
        <span>새 프로젝트 생성</span>
      </button>

      <!-- 아래에서 위로 올라오는 '새 프로젝트 생성 창' (바텀 시트) -->
<div id="project-modal" class="bottom-sheet-overlay">
  <div class="bottom-sheet-content">
  <!-- 상단 드래그 영역 (핸들 바 + 좌우/상하 여백 전체 포함) -->
  <div class="sheet-drag-zone">
    <div class="sheet-handle"></div>
  </div>
    <!-- 시트 헤더 -->
    <div class="sheet-header">
      <h2 class="sheet-title">새 프로젝트 만들기</h2>
      <p class="sheet-subtitle">나만의 고도 필름을 만들어보세요.</p>
    </div>

    <!-- 입력 및 셀 선택 영역 -->
    <div class="sheet-body">
      <!-- 1. 프로젝트 이름 입력 -->
      <div class="input-group">
        <label class="input-label">프로젝트 이름</label>
        <div class="input-box-wrapper">
          <input type="text" id="project-name-input" placeholder="프로젝트 이름을 입력하세요" class="sheet-input">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </div>
      </div>

      <!-- 2. 산 선택 (가로 스크롤 셀) -->
      <div class="input-group">
        <label class="input-label">산 선택</label>
        <div class="horizontal-cell-group" id="mountain-cells">
          <button type="button" class="select-cell active" data-value="소래산">
            <span class="cell-icon">⛰️</span>
            <span>소래산</span>
          </button>
          <button type="button" class="select-cell" data-value="배봉산">
            <span class="cell-icon">⛰️</span>
            <span>배봉산</span>
          </button>
          <button type="button" class="select-cell" data-value="수락산">
            <span class="cell-icon">⛰️</span>
            <span>수락산</span>
          </button>
          <button type="button" class="select-cell" data-value="구름산">
            <span class="cell-icon">⛰️</span>
            <span>구름산</span>
          </button>
          <button type="button" class="select-cell" data-value="미륵산">
            <span class="cell-icon">⛰️</span>
            <span>미륵산</span>
          </button>
        </div>
      </div>

      <!-- 3. 디자인 선택 (가로 스크롤 셀) -->
      <div class="input-group">
        <label class="input-label">디자인 선택</label>
        <div class="horizontal-cell-group" id="design-cells">
          <button type="button" class="select-cell active" data-value="산 정상">
            <span class="cell-icon">🎬</span>
            <span>산 정상</span>
          </button>
          <button type="button" class="select-cell" data-value="크래프트 (영어)">
            <span class="cell-icon">🎬</span>
            <span>크래프트 (영어)</span>
          </button>
          <button type="button" class="select-cell" data-value="크래프트 (한글)">
            <span class="cell-icon">🎬</span>
            <span>크래프트 (한글)</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 하단 생성 버튼 -->
    <button id="create-project-submit-btn" class="sheet-submit-btn">프로젝트 만들기</button>
  </div>
</div>
    </div> <!-- #home-view 정상 닫힘 -->

    <!-- 2. 카메라 화면 뷰 (홈 화면과 동등한 위치) -->
    <div id="camera-page-view" class="main-view" style="display: none;">
      <div class="app-container">
        <button id="back-to-home-btn" aria-label="초기 화면으로 나가기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        
        <div class="phone-screen">
          <div id="slider-wrapper" class="slider-wrapper"> 
            <div class="slide-page" id="camera-page">
              <video id="camera-view" autoplay playsinline></video>
              <div class="altitude-overlay" id="altitude-text">⛰️ 초기 고도 측정중...</div>
              <button id="record-btn">REC</button>
              <div class="swipe-guide" id="swipe-guide">▶ 밀어서 이전 영상 확인</div>
              
              <button id="switch-camera-btn" aria-label="카메라 전환">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 4v6h-6M1 20v-6h6M21.34 15.57a10 10 0 1 1-.57-8.38 15.67 15.67 0 0 1 .57 8.38"/>
                </svg>
              </button>
              
              <div class="timer-container">
                <div class="timer-menu" id="timer-menu">
                  <button class="timer-option-btn hide-option" id="timer-clear-btn" data-secs="0" style="display: none;">해제</button>
                  <button class="timer-option-btn" data-secs="5">5s</button>
                  <button class="timer-option-btn" data-secs="10">10s</button>
                </div>
                <button id="timer-btn" aria-label="타이머 설정">
                  <svg id="timer-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  <span id="timer-btn-text" style="display: none;"></span>
                </button>
              </div>
              
              <div class="zoom-container">
                <div class="zoom-menu" id="zoom-menu">
                  <button class="zoom-option-btn" id="zoom-05-btn" data-zoom="0.5">0.5x</button>
                  <button class="zoom-option-btn" data-zoom="1.0">1x</button>
                  <button class="zoom-option-btn" data-zoom="1.5">1.5x</button>
                </div>
                <button id="zoom-btn">
                  <span id="zoom-btn-text">1x</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        
        <button id="total-download-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/> 
          </svg>
          <span>고도필름 다운로드</span>
        </button>
      </div>
    </div> <!-- #camera-page-view 정상 닫힘 -->
  </div> <!-- #main-container 정상 닫힘 -->

  <script src="script.js"></script>
</body>
</html>
